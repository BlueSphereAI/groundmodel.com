<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>{{ page_title }} — Ground Model</title>
  <meta name="description" content="{{ page_description }}">
  <meta property="og:title" content="{{ page_title }} — Ground Model">
  <meta property="og:description" content="{{ page_description }}">
  <meta property="og:type" content="website">
  <meta property="og:url" content="{{ canonical_url }}">
  <meta name="twitter:card" content="summary">
  <link rel="canonical" href="{{ canonical_url }}">
  <link rel="icon" href="/static/favicon.svg" type="image/svg+xml">
  <link rel="stylesheet" href="/static/style.css">
  <style>
    .page-content h2 {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', system-ui, sans-serif;
      font-size: 1.375rem;
      font-weight: 700;
      margin: 2rem 0 0.75rem;
      color: #1A1A1A;
    }
    .page-content h3 {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', system-ui, sans-serif;
      font-size: 1.0625rem;
      font-weight: 600;
      margin: 1.5rem 0 0.5rem;
      color: #1A1A1A;
    }
    .page-content p {
      margin-bottom: 1.25rem;
      color: #374151;
    }
    .page-content ul, .page-content ol {
      margin: 0.75rem 0 1.25rem 1.5rem;
    }
    .page-content li {
      margin-bottom: 0.375rem;
      color: #374151;
    }
    .page-content strong { color: #1A1A1A; }
    .page-content a { color: #E8521A; text-decoration: underline; text-underline-offset: 2px; }
    .page-content a:hover { color: #c0401c; }
    .page-content hr {
      border: none;
      border-top: 1px solid #E5E5E0;
      margin: 2rem 0;
    }
    .page-header {
      margin-bottom: 2.5rem;
      padding-bottom: 1.5rem;
      border-bottom: 1px solid #E5E5E0;
    }
    .page-header h1 {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', system-ui, sans-serif;
      font-size: 2rem;
      font-weight: 800;
      color: #1A1A1A;
      letter-spacing: -0.02em;
      margin-bottom: 0;
    }
  </style>
</head>
<body>
  <div class="page-shell">
    <header class="site-header">
      <a href="/" class="logo">Ground Model</a>
      <span class="tagline">AI news. No hype. Just signal.</span>
    </header>

    <a href="/" class="back-link">&larr; Home</a>

    <article>
      <div class="page-header">
        <h1>{{ page_title }}</h1>
      </div>
      <div class="page-content">
        {{ content }}
      </div>
    </article>

    <footer class="site-footer">
      <div class="footer-bottom">
        <span class="copyright">&copy; {{ year }} Ground Model</span>
        <span style="display:flex;gap:1rem;align-items:center;">
          <a href="/about.html" class="unsubscribe">About</a>
          <a href="/privacy.html" class="unsubscribe">Privacy</a>
          <a href="https://ground-model.beehiiv.com/unsubscribe" class="unsubscribe">Unsubscribe</a>
        </span>
      </div>
    </footer>
  </div>
</body>
</html>
